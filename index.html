<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .page-title {
  margin-bottom: 25px;
  font-size: 28px;
  color: #333;
  }

  .container {
    display: flex;
    gap: 20px;
    justify-content: center;
  }

  .card {
  background: white;
  padding: 20px;
  width: 380px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .card h2 {
    margin-top: 0;
    color: #444;
  }

  button {
  padding: 10px 20px;
  margin-right: 10px;
  margin-bottom: 10px;
  background: #e8e8e8;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  }

  button:hover {
    background: #dcdcdc;
  }
    #timerDisplay {
      font-size: 15px;
      font-weight: bold;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      background: #f0f0f0;
    }
	
	#bookBtn, #bookDisabledBtn {
		padding: 10px 20px;
		margin-right: 10px;
		margin-top: 10px;
		font-size: 16px;
	}

    .warning {
      color: white !important ;
      background: red !important;
    }

    button {
      padding: 10px 20px;
      margin-right: 10px;
      font-size: 16px;
    }

    #statusBox {
    margin-top: 15px;
    padding: 10px;
    background: #e8e8e8;
    
    border-radius: 6px;
    font-size: 16px;
    border-left: 5px solid #888;
  }

  #statusBox.success {
       background: #e8e8e8;
       white-space: pre-line;

  }

  #statusBox.error {
      background: #ffd4d4 !important;
      border-left-color: #e74c3c !important;
      white-space: pre-line;
  }

  </style>
</head>

<body>
 <h1 class="page-title">Smart Parking Control Panel</h1>

    <!-- TIMER BOX -->
    <div class="card">
      <h2>Parking Countdown Timer</h2>

      <button id="startBtn">Start Timer</button>
      <button id="stopBtn">Stop Timer</button>

      <div id="timerDisplay">Timer not started</div>
    </div>
  
     <!-- BOOKING BOX -->
    <div class="card">
      <h2>Book a Parking Space</h2>

      <button id="bookBtn" disabled>Book a Parking Space</button>
      <button id="bookDisabledBtn" disabled>Book a Disabled Parking Space</button>

      <button id="logoutBtn" style="display:none;">Logout</button>

      <div id="statusBox">Status…</div>
    </div>

  </div>

  <script src="client_browser.js"></script>
</body>
</html>
