<!DOCTYPE html>
<html>
<head>
  <title>Smart Parking </title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 20px;
      background: #f5f5f5;
    }

    .page-title {
  margin-bottom: 25px;
  font-size: 28px;
  color: #333;
  }

  .container {
    display: flex;
    gap: 20px;
    justify-content: center;
  }
	  #loginPanel {
    border: 2px ;
    padding: 15px;
    margin-bottom: 20px;
    background: #f0f0f0;
    width: 350px;
    border-radius: 12px;  
  }

  #loginPanel h2 {
    text-align: center;
    margin-top: 0;
  }

  #loginPanel input {
    width: 95%;
    padding: 6px;
    margin-bottom: 10px;
     border-radius: 6px;
  }

  #loginStatus {
    margin-top: 10px;
    padding: 8px;
    text-align: center;
  }

  #loginBtn {
     display: block;
    margin: 10px auto;    
    border: 2px solid #222;   
    padding: 8px 14px;
    background: #e0e0e0;
    cursor: pointer;
    border-radius: 6px;
    font-weight: bold;
  }

  #loginBtn:hover {
      background: #d5d5d5;
      border-color: #000;        
  }

  #loginStatus.success {
    background: #c8f7c5;
    color: #0a7a0a;
  }

  #loginStatus.error {
    background: #f7c5c5;
    color: #7a0a0a;
  }

  .fadeOut {
    opacity: 0;
    transition: opacity 1.6s ease-out;
  }

  #logoutBtn {
    margin-top: 10px;
    padding: 8px 14px;
    border: 2px solid #222;
    background: #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    font-weight: bold;
  }

  #logoutBtn:hover {
      background: #d5d5d5;
      border-color: #000;
  }

  #logoutPopup {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #333;
    color: #fff;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: bold;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.6s ease-out;
    z-index: 9999;
  }

  #logoutPopup.show {
      opacity: 1;
  }



  .card {
  background: white;
  padding: 20px;
  width: 380px;
  border-radius: 10px;
  box-shadow: 0 4px 10px rgba(0,0,0,0.1);
  }

  .card h2 {
    margin-top: 0;
    color: #444;
  }

  button {
  padding: 10px 20px;
  margin-right: 10px;
  margin-bottom: 10px;
  background: #e8e8e8;
  border: none;
  border-radius: 6px;
  font-size: 16px;
  cursor: pointer;
  }

  button:hover {
    background: #dcdcdc;
  }
    #timerDisplay {
      font-size: 15px;
      font-weight: bold;
      margin-top: 20px;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      background: #f0f0f0;
    }
	
	#bookBtn, #bookDisabledBtn {
		padding: 10px 20px;
		margin-right: 10px;
		margin-top: 10px;
		font-size: 16px;
	}

    .warning {
      color: white !important ;
      background: red !important;
    }

    button {
      padding: 10px 20px;
      margin-right: 10px;
      font-size: 16px;
    }

    #statusBox {
    margin-top: 15px;
    padding: 10px;
    background: #e8e8e8;
    
    border-radius: 6px;
    font-size: 16px;
    border-left: 5px solid #888;
  }

  #statusBox.success {
       background: #e8e8e8;
       white-space: pre-line;

  }

  #statusBox.error {
      background: #ffd4d4 !important;
      border-left-color: #e74c3c !important;
      white-space: pre-line;
  }

  </style>
</head>

<body>
 <h1 class="page-title">Smart Parking Control Panel</h1>    <div id="loginPanel">
        
	 <h2>Login</h2>

        <div id="loginStatus">Please enter your login details</div>

        <label for="loginName">Login Name:</label>
        <input type="text" id="loginName" placeholder="Enter username"  value="admin">

        <label for="loginPassword">Password:</label>
        <input type="password" id="loginPassword" placeholder="Enter password"  value="1234">

        <button id="loginBtn">Login</button>

        <button id="registerBtn" disabled style="display:none; margin-top:10px;">
        Register New User</button>
    </div>


    <!-- TIMER BOX -->
    <div class="card">
      <h2>Parking Countdown Timer</h2>

      <button id="startBtn">Start Timer</button>
      <button id="stopBtn">Stop Timer</button>

      <div id="timerDisplay">Timer not started</div>
    </div>
  
     <!-- BOOKING BOX -->
    <div class="card">
      <h2>Book a Parking Space</h2>

      <button id="bookBtn" disabled>Book a Parking Space</button>
      <button id="bookDisabledBtn" disabled>Book a Disabled Parking Space</button>

      <button id="logoutBtn" style="display:none;">Logout</button>

      <div id="statusBox">Status…</div>
    </div>

  </div>

  <script src="client_browser.js"></script>
</body>
</html>
